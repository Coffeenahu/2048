<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2048</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- 초기 선택 화면 -->
  <div id="startScreen">
    <div class="start-content">
      <h1>2048</h1>
      <p class="start-sub">타일을 합쳐 <strong>2048</strong>을 만들어보세요!</p>
      <p class="start-label">보드 크기 선택</p>
      <div class="start-btns">
        <button class="start-btn" id="startBtn4">
          <span class="btn-size">4 × 4</span>
          <span class="btn-desc">클래식</span>
        </button>
        <button class="start-btn" id="startBtn5">
          <span class="btn-size">5 × 5</span>
          <span class="btn-desc">캐주얼</span>
        </button>
      </div>
    </div>
  </div>

  <!-- 게임 화면 -->
  <div class="container hidden" id="gameContainer">
    <header>
      <h1>2048</h1>
      <div class="header-right">
        <div class="scores">
          <div class="score-box">
            <span class="score-label">SCORE</span>
            <span id="score">0</span>
          </div>
          <div class="score-box">
            <span class="score-label">BEST</span>
            <span id="best">0</span>
          </div>
        </div>
        <div class="action-btns">
          <button id="undoBtn" disabled>Undo</button>
          <button id="newGame">New Game</button>
        </div>
      </div>
    </header>

    <p class="subtitle">Join the tiles, get to <strong>2048!</strong></p>

    <div id="board">
      <!-- 셀은 JS에서 동적 생성 -->
    </div>

    <div id="overlay" class="hidden">
      <div class="overlay-content">
        <h2 id="overlayTitle">Game Over!</h2>
        <p>Score: <span id="finalScore">0</span></p>
        <button id="tryAgain">Try Again</button>
      </div>
    </div>
  </div>

  <script src="game.js"></script>
</body>
</html>
